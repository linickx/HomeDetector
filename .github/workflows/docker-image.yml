# Modified by Antigravity using model gemini-3.5-flash on 2026-05-31
name: Docker-Image

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: addon-homedetector

permissions:
  contents: read

jobs:
  test-build:
    name: Run Test Build
    uses: ./.github/workflows/test-build.yml

  test-python:
    name: Run Python Tests
    uses: ./.github/workflows/test-python.yml

  init:
    name: Initialize build
    needs: [test-build, test-python]
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@master
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: docker.io/${{ vars.DOCKERHUB_USERNAME }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write # Write needed for Cosign signing (issue OIDC token for signing)
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        uses: home-assistant/builder/actions/build-image@master
        with:
          arch: ${{ matrix.arch }}
          container-registry: docker.io
          container-registry-username: ${{ vars.DOCKERHUB_USERNAME }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ github.event.release.tag_name || 'test' }}
            latest
          push: ${{ github.event_name == 'release' && github.event.release.draft == false }}
          version: ${{ github.event.release.tag_name || 'test' }}

      - name: Create SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image }}:latest
          format: spdx-json

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    if: github.event_name == 'release' && github.event.release.draft == false
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Write needed for Cosign signing (issue OIDC token for signing)
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@master
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry: docker.io
          registry-prefix: docker.io/${{ vars.DOCKERHUB_USERNAME }}
          container-registry-username: ${{ vars.DOCKERHUB_USERNAME }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ github.event.release.tag_name }}
            latest
